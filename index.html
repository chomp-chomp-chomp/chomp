<!DOCTYPE html>
<html lang="en">
<head>

  <!-- Open Graph / Facebook -->

  <meta property="og:description" content="Baking is the materialization of comfort itself.">

  <meta property="twitter:title" content="Chomp Chomp Recipes">
  <meta property="twitter:description" content="Baking is the materialization of comfort itself.">
  <meta property="twitter:image" content="NEED_IMG_3460">

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Shared Stylesheet -->
  <link rel="stylesheet" href="styles.css">

  <style>
    /* Quick links bar */
    .quick-links-bar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      align-items: center;
      padding: 14px 20px;
      border-bottom: 1px solid var(--color-border);
      margin-bottom: 30px;
    }

    .quick-link {
      display: inline-block;
      padding: 5px 14px;
      border: 1px solid var(--color-border);
      border-radius: 20px;
      font-size: 0.875em;
      text-decoration: none;
      color: var(--color-text-muted);
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }

    .quick-link:hover {
      color: var(--color-accent);
      border-color: var(--color-accent);
    }

    /* Recipe search & filters */
    .recipe-search-box {
      flex: 1;
      min-width: 200px;
      max-width: 500px;
      padding: 10px 14px;
      font-size: 15px;
      font-family: 'Inter', sans-serif;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background-color: var(--color-bg);
      color: var(--color-text);
    }

    .recipe-search-box:focus {
      outline: none;
      border-color: var(--color-accent);
    }

    .filter-controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      margin-bottom: 24px;
    }

    .filter-controls select {
      padding: 8px 12px;
      border: 1px solid var(--color-border);
      border-radius: 8px;
      font-family: 'Inter', sans-serif;
      font-size: 15px;
      background-color: var(--color-bg);
      color: var(--color-text);
    }

    .no-results {
      text-align: center;
      padding: 40px 20px;
      color: var(--color-text-muted);
      font-size: 1.1em;
    }

    /* Recipe count with fade animation */
    #recipeCount {
      margin-bottom: 15px;
      color: var(--color-text-muted);
      font-size: 0.9em;
      text-align: center;
      display: none;
      transition: opacity 0.25s ease-in-out;
    }

    #recipeCount.fade-out {
      opacity: 0;
    }

    /* Tagline / intro */
    .home-intro {
      text-align: center;
      padding: 24px 20px 0;
    }

    .home-intro p {
      font-size: 0.95em;
      color: var(--color-text-muted);
      margin: 0 0 6px;
    }

    .home-intro a {
      color: var(--color-accent);
      text-decoration: none;
      font-size: 0.875em;
    }

    .home-intro a:hover {
      text-decoration: underline;
    }

    /* Recent writing section */
    .recipes-section-header {
      font-size: 0.75em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--color-text-muted);
      text-align: center;
      margin-bottom: 20px;
    }

    .recent-writing-section {
      max-width: 680px;
      margin: 0 auto 36px;
      padding: 0 20px;
    }

    .recent-writing-header {
      font-size: 0.75em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: var(--color-text-muted);
      text-align: center;
      margin-bottom: 14px;
    }

    .recent-writing-header a {
      color: inherit;
      text-decoration: none;
    }

    .recent-writing-header a:hover {
      color: var(--color-accent);
    }

    .recent-post {
      padding: 14px 0;
      border-top: 1px solid var(--color-border);
    }

    .recent-post-ps {
      border-bottom: 1px solid var(--color-border);
    }

    .recent-post-ps a {
      font-size: 0.875em;
      color: var(--color-accent);
      text-decoration: none;
    }

    .recent-post-ps a:hover {
      text-decoration: underline;
    }

    .recent-post-title {
      display: block;
      font-size: 1em;
      font-weight: 500;
      color: var(--color-text);
      text-decoration: none;
      margin-bottom: 5px;
      line-height: 1.4;
    }

    .recent-post-title:hover {
      color: var(--color-accent);
    }

    .recent-post-excerpt {
      font-size: 0.875em;
      color: var(--color-text-muted);
      line-height: 1.55;
      margin: 0 0 5px;
    }

    .recent-post-date {
      font-size: 0.775em;
      color: var(--color-text-muted);
      opacity: 0.7;
      margin: 0;
    }
  </style>
</head>
<body>

  <!-- Site Header / Navigation -->
  <header class="site-header">
    <nav class="site-nav">
      <div class="header-left">
        <a href="https://ps.chom.ps" title="Store" class="site-logo">
          <div class="site-logo-icon">
            <img src="https://ik.imagekit.io/chompchomp/logo-default_01ng4rCAq.png" alt="Chomp Chomp" class="logo-default">
            <img src="https://ik.imagekit.io/chompchomp/logo-hover_Xkgt_S3PG.jpg" alt="Chomp Chomp" class="logo-hover">
          </div>
        </a>
      </div>

      <div class="header-center">
        <a href="recipes.html" title="Recipes">
          <img src="https://ik.imagekit.io/chompchomp/Chomp%20Chomp%20logo%20light" alt="Chomp Chomp" class="header-banner banner-light">
          <img src="https://ik.imagekit.io/chompchomp/Chomp%20Chomp%20logo%20dark"  alt="Chomp Chomp" class="header-banner banner-dark">
        </a>
      </div>

      <div class="header-right">
        <div class="nav-tools-dropdown">
          <button class="menu-toggle" onclick="toggleToolsDropdown()">☰</button>
          <button class="tools-dropdown-btn" onclick="toggleToolsDropdown()">Menu ▼</button>
          <ul class="tools-dropdown-menu" id="toolsDropdown">
            <!-- Navigation menu loaded dynamically by navigation.js -->
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <!-- Main Content Area -->
  <main class="page-container">

    <!-- Tagline -->
    <div class="home-intro">
      <p>Baking is the materialization of comfort itself.</p>
      <a href="mailto:hi@chom.ps">hi@chom.ps</a>
    </div>

    <!-- Quick Links Bar -->
    <nav class="quick-links-bar" aria-label="Quick links">
      <a href="lexicon.html" class="quick-link">Lexicon</a>
      <a href="reading-list.html" class="quick-link">Reading List</a>
      <a href="playlists.html" class="quick-link">Playlists</a>
      <a href="about.html" class="quick-link">About</a>
    </nav>

    <!-- Recent Postscripts from ps.chom.ps -->
    <div class="recent-writing-section" id="recentWriting">
      <div class="recent-writing-header">
        <a href="https://ps.chom.ps" target="_blank" rel="noopener">Recent Postscripts</a>
      </div>
      <div id="recentWritingPosts"></div>
      <div class="recent-post recent-post-ps">
        <a href="https://ps.chom.ps" target="_blank" rel="noopener">.ps</a>
      </div>
    </div>

    <!-- Search & Filter Controls -->
    <section class="content-wrapper">
      <div class="recipes-section-header">Recipes &amp; Rituals</div>
      <div class="filter-controls">
        <input type="text"
               class="recipe-search-box"
               id="recipeSearch"
               placeholder="Search recipes by name, ingredient, or keyword…">

        <select id="dishTypeFilter">
          <option value="all">All Dish Types</option>
        </select>

        <select id="sortBy">
          <option value="alphabetical">Sort: A–Z</option>
          <option value="time">Sort: Quickest First</option>
        </select>

        <button class="btn btn-outline" id="clearBtn">Clear</button>
      </div>
    </section>

    <!-- Recipe Count -->
    <div id="recipeCount"></div>

    <!-- Recipe Grid -->
    <section class="recipe-grid" id="recipeGrid">
      <div class="no-results" id="noResults" style="display: none; grid-column: 1 / -1;">
        No recipes found. Try adjusting your filters.
      </div>
    </section>

    <!-- Load More Button -->
    <div class="text-center mt-xl">
      <button class="btn btn-primary" id="loadMoreBtn" style="display: none;">
        Load More Recipes
      </button>
    </div>

  </main>

  <!-- Footer -->
  <footer class="site-footer">
    <div class="footer-content">
      <p>Baking is the materialization of comfort itself.</p>
      <p style="margin-top: 20px; font-size: 0.85em;">&copy; 2026 Chomp Chomp</p>
    </div>
  </footer>

  <!-- Recipe Logic -->
  <script>

    let recipes = [];
    let displayedRecipes = 0;
    const RECIPES_PER_PAGE = 15;

    // Helper: Generate slug from title
    function generateSlug(title) {
      return String(title || '')
        .toLowerCase()
        .replace(/[^a-z0-9\s-]/g, '')
        .replace(/\s+/g, '-')
        .replace(/-+/g, '-')
        .trim('-');
    }

    // Helper: Parse time strings
    function parseTime(timeString) {
      if (!timeString) return Infinity;
      const rangeMatch = String(timeString).match(/^(\d+)/);
      const rangeMinutes = rangeMatch ? parseInt(rangeMatch[1]) : 0;
      const hoursMatch = String(timeString).match(/(\d+)\s*h/);
      const hours = hoursMatch ? parseInt(hoursMatch[1]) * 60 : 0;
      const minutesMatch = String(timeString).match(/(\d+)\s*min/);
      const minutes = minutesMatch ? parseInt(minutesMatch[1]) : 0;
      if (hours + minutes > 0) return hours + minutes;
      else if (rangeMinutes > 0) return rangeMinutes;
      return Infinity;
    }

    // Helper: Assign dish type based on title
    function assignDishType(title) {
      const lower = String(title || '').toLowerCase();
      if (lower.includes('cake') || lower.includes('torte') || lower.includes('pie') || lower.includes('brûlée')) return 'Dessert/Pastry';
      if (lower.includes('cookie') || lower.includes('cookies')) return 'Cookie/Bar';
      if (lower.includes('custard')) return 'Frozen Dessert';
      if (lower.includes('pudding')) return 'Pudding/Cream';
      if (lower.includes('taco') || lower.includes('main dish')) return 'Main Dish';
      if (lower.includes('soup')) return 'Soup';
      return 'Other Baked Goods';
    }

    // Recipe count with fade animation
    function updateRecipeCount(filteredCount, totalCount) {
      const el = document.getElementById('recipeCount');
      if (!el) return;
      if (totalCount === 0) { el.style.display = 'none'; return; }

      if (el.style.display === 'none' || el.textContent === '') {
        el.textContent = `Showing ${filteredCount} of ${totalCount} recipes`;
        el.style.display = 'block';
        return;
      }

      el.classList.add('fade-out');
      setTimeout(() => {
        el.textContent = `Showing ${filteredCount} of ${totalCount} recipes`;
        el.classList.remove('fade-out');
      }, 250);
    }

    // Load recipes from JSON
    async function loadRecipes() {
      try {
        const response = await fetch('/data/recipes.json');
        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

        const data = await response.json();

        recipes = data.map(recipe => ({
          ...recipe,
          slug: recipe.slug || generateSlug(recipe.title),
          totalTimeInMinutes: recipe.totalTimeInMinutes || parseTime(recipe.totalTime || recipe.cookTime),
          dishType: recipe.dishType || assignDishType(recipe.title)
        }));

        populateFilters();
        applyFiltersAndDisplay();

      } catch (error) {
        console.error('Error loading recipes:', error);
        const noResults = document.getElementById('noResults');
        if (noResults) {
          noResults.style.display = 'block';
          noResults.textContent = 'Failed to load recipes. Please refresh the page.';
        }
      }
    }

    // Populate filter dropdowns
    function populateFilters() {
      const dishTypes = [...new Set(recipes.map(r => r.dishType).filter(d => d))].sort();
      const dishTypeFilter = document.getElementById('dishTypeFilter');
      if (dishTypeFilter) {
        dishTypeFilter.innerHTML = '<option value="all">All Dish Types</option>' +
          dishTypes.map(d => `<option value="${d}">${d}</option>`).join('');
      }
    }

    // Apply filters and sort, then display
    function applyFiltersAndDisplay() {
      const searchInput   = document.getElementById('recipeSearch');
      const dishTypeSelect = document.getElementById('dishTypeFilter');
      const sortSelect    = document.getElementById('sortBy');

      const searchTerm = (searchInput?.value || '').toLowerCase();
      const dishType   = dishTypeSelect?.value || 'all';
      const sortBy     = sortSelect?.value || 'alphabetical';

      let filtered = recipes.filter(r => {
        const title       = String(r.title || '').toLowerCase();
        const description = String(r.description || '').toLowerCase();

        const matchesSearch =
          !searchTerm ||
          title.includes(searchTerm) ||
          description.includes(searchTerm) ||
          (Array.isArray(r.ingredients) && r.ingredients.some(i =>
            typeof i === 'string' && i.toLowerCase().includes(searchTerm)
          ));

        const matchesDishType = dishType === 'all' || r.dishType === dishType;

        return matchesSearch && matchesDishType;
      });

      if (sortBy === 'time') {
        filtered.sort((a, b) => (a.totalTimeInMinutes || Infinity) - (b.totalTimeInMinutes || Infinity));
      } else {
        filtered.sort((a, b) =>
          String(a.title || '').toLowerCase().localeCompare(String(b.title || '').toLowerCase())
        );
      }

      updateRecipeCount(filtered.length, recipes.length);
      displayedRecipes = 0;
      displayRecipes(filtered);
    }

    // Display recipes in grid
    function displayRecipes(recipesToShow) {
      const grid        = document.getElementById('recipeGrid');
      const noResults   = document.getElementById('noResults');
      const loadMoreBtn = document.getElementById('loadMoreBtn');

      if (!grid) return;

      if (!recipesToShow || recipesToShow.length === 0) {
        grid.innerHTML = '';
        if (noResults) noResults.style.display = 'block';
        if (loadMoreBtn) loadMoreBtn.style.display = 'none';
        return;
      }

      if (noResults) noResults.style.display = 'none';
      if (displayedRecipes === 0) {
        displayedRecipes = Math.min(RECIPES_PER_PAGE, recipesToShow.length);
      } else {
        displayedRecipes = Math.min(displayedRecipes, recipesToShow.length);
      }

      grid.innerHTML = recipesToShow.slice(0, displayedRecipes).map(recipe => {
        const timeText = (recipe.totalTimeInMinutes === Infinity || recipe.totalTimeInMinutes == null)
          ? 'Time N/A'
          : `${recipe.totalTimeInMinutes} min`;
        const imagePath = recipe.image
          ? (recipe.image.startsWith('http') ? recipe.image : `images/${recipe.image}`)
          : null;

        return `
          <article class="recipe-card" onclick="window.location.href='recipe.html?slug=${recipe.slug}'">
            ${imagePath
              ? `<img src="${imagePath}" alt="${recipe.title}" class="recipe-card-image">`
              : '<div class="post-tile-placeholder">No Image Available</div>'
            }
            <div class="recipe-card-content">
              <h3 class="recipe-card-title">${recipe.title}</h3>
              <p class="card-description" style="font-size: 0.9em; color: var(--color-text-muted); margin: 8px 0;">
                ${recipe.description
                  ? (recipe.description.length > 250 ? recipe.description.substring(0, 250) + '…' : recipe.description)
                  : 'A delicious recipe waiting to be made!'}
              </p>
              <div style="display: flex; justify-content: space-between; align-items: center; margin-top: auto; padding-top: 10px; font-size: 0.85em; color: var(--color-text-muted);">
                <span style="color: var(--color-accent); font-weight: 500;">${recipe.dishType || 'Recipe'}</span>
                <span>${timeText}</span>
              </div>
            </div>
          </article>
        `;
      }).join('');

      if (loadMoreBtn) {
        loadMoreBtn.style.display = displayedRecipes < recipesToShow.length ? 'inline-block' : 'none';
      }

      window.currentFilteredRecipes = recipesToShow;
    }

    // Load more recipes
    window.loadMoreRecipes = function() {
      const recipesToShow = window.currentFilteredRecipes || recipes;
      displayedRecipes += RECIPES_PER_PAGE;
      displayRecipes(recipesToShow);
    };

    // Clear all filters
    function clearFilters() {
      const searchInput    = document.getElementById('recipeSearch');
      const dishTypeSelect = document.getElementById('dishTypeFilter');
      const sortSelect     = document.getElementById('sortBy');
      if (searchInput)    searchInput.value = '';
      if (dishTypeSelect) dishTypeSelect.value = 'all';
      if (sortSelect)     sortSelect.value = 'alphabetical';
      applyFiltersAndDisplay();
    }

    // Event listeners
    document.addEventListener('DOMContentLoaded', () => {
      const searchInput    = document.getElementById('recipeSearch');
      const dishTypeSelect = document.getElementById('dishTypeFilter');
      const sortSelect     = document.getElementById('sortBy');
      const clearBtn       = document.getElementById('clearBtn');
      const loadMoreBtn    = document.getElementById('loadMoreBtn');

      searchInput?.addEventListener('keypress', e => {
        if (e.key === 'Enter') applyFiltersAndDisplay();
      });

      // Live-filter as user types (with small debounce)
      let debounceTimer;
      searchInput?.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(applyFiltersAndDisplay, 300);
      });

      dishTypeSelect?.addEventListener('change', applyFiltersAndDisplay);
      sortSelect?.addEventListener('change', applyFiltersAndDisplay);
      clearBtn?.addEventListener('click', clearFilters);
      loadMoreBtn?.addEventListener('click', () => window.loadMoreRecipes?.());
    });

    // Fetch recent posts from ps.chom.ps RSS feed
    async function loadRecentWriting() {
      const FEED_URL = 'https://ps.chom.ps/feed.xml';
      const MAX_POSTS = 3;
      const EXCERPT_LEN = 160;

      try {
        const response = await fetch(FEED_URL);
        if (!response.ok) return; // fail silently

        const text = await response.text();
        const xml  = new DOMParser().parseFromString(text, 'application/xml');

        // Support RSS 2.0 (<item>) and Atom (<entry>)
        const items = [...xml.querySelectorAll('item, entry')].slice(0, MAX_POSTS);
        if (!items.length) return;

        // Strip HTML tags and normalise whitespace
        function stripHtml(str) {
          return (str || '')
            .replace(/<[^>]*>/g, ' ')
            .replace(/&amp;/g, '&').replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"').replace(/&#39;/g, "'")
            .replace(/\s+/g, ' ')
            .trim();
        }

        const posts = items.map(item => {
          const title = stripHtml(item.querySelector('title')?.textContent) || 'Untitled';

          // RSS 2.0: <link> is a text node; Atom: <link href="…">
          const linkEl = item.querySelector('link');
          const url    = linkEl?.getAttribute('href') || linkEl?.textContent?.trim() || '#';

          // Excerpt: prefer <summary> (Atom) then <description> (RSS 2.0)
          const rawExcerpt =
            item.querySelector('summary')?.textContent ||
            item.querySelector('description')?.textContent ||
            '';
          const excerpt = stripHtml(rawExcerpt);
          const short   = excerpt.length > EXCERPT_LEN
            ? excerpt.slice(0, EXCERPT_LEN).replace(/\s+\S*$/, '') + '…'
            : excerpt;

          // Date: <pubDate> (RSS 2.0) or <published>/<updated> (Atom)
          const rawDate =
            item.querySelector('pubDate')?.textContent ||
            item.querySelector('published')?.textContent ||
            item.querySelector('updated')?.textContent ||
            '';
          let dateStr = '';
          if (rawDate) {
            const d = new Date(rawDate);
            if (!isNaN(d)) {
              dateStr = d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
            }
          }

          return { title, url, excerpt: short, date: dateStr };
        });

        const postsEl = document.getElementById('recentWritingPosts');
        if (!postsEl) return;

        postsEl.innerHTML = posts.map(p => `
          <div class="recent-post">
            <a class="recent-post-title" href="${p.url}" target="_blank" rel="noopener">${p.title}</a>
            ${p.excerpt ? `<p class="recent-post-excerpt">${p.excerpt}</p>` : ''}
            ${p.date ? `<p class="recent-post-date">${p.date}</p>` : ''}
          </div>
        `).join('');

      } catch {
        // Network or CORS error — section stays hidden, no console noise
      }
    }

    // Initialize
    loadRecipes();
    loadRecentWriting();

  </script>

  <!-- Dynamic Navigation System -->
  <script src="/navigation.js"></script>

  <!-- Navigation toggle -->
  <script>
    function toggleToolsDropdown() {
      const dropdown = document.getElementById('toolsDropdown');
      dropdown.classList.toggle('active');
    }
  </script>
