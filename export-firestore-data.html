<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Export Firestore Data to JSON</title>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #fdfdfd;
            color: #353535;
        }
        h1 {
            color: #e73b42;
        }
        .collection {
            background: #f5f5f5;
            padding: 20px;
            margin: 20px 0;
            border-radius: 8px;
        }
        button {
            background: #e73b42;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 10px 10px 0;
        }
        button:hover {
            background: #d12a31;
        }
        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }
        .status {
            margin-top: 10px;
            padding: 10px;
            border-radius: 4px;
            background: #e8f5e9;
            color: #2e7d32;
        }
        .error {
            background: #ffebee;
            color: #c62828;
        }
        pre {
            background: #2b2b2b;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 13px;
        }
        .download-link {
            display: inline-block;
            margin-top: 10px;
            color: #e73b42;
            text-decoration: none;
            font-weight: 500;
        }
        .download-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <h1>Export Firestore Data to JSON</h1>
    <p>This tool will download all your Firestore collections and save them as JSON files.</p>

    <div class="collection">
        <h3>Collections to Export:</h3>
        <ul>
            <li><strong>recipes</strong> - All recipe data</li>
            <li><strong>posts</strong> - All blog posts/stories</li>
            <li><strong>lexicon</strong> - All lexicon entries</li>
            <li><strong>books</strong> - All reading list items</li>
        </ul>
    </div>

    <button id="exportBtn">Export All Collections</button>
    <button id="exportIndividualBtn">Export Collections Individually</button>

    <div id="status"></div>
    <div id="downloads"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, getDocs } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyDXOselL25mXgLTD4dxJQiwnHJnnux8ixk",
            authDomain: "chomp-chomp-recipes.firebaseapp.com",
            projectId: "chomp-chomp-recipes",
            storageBucket: "chomp-chomp-recipes.firebasestorage.app",
            messagingSenderId: "1038630516277",
            appId: "1:1038630516277:web:aee99a89d3a16d61eaa3cb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const collections = [
            { name: 'recipes', path: `artifacts/${firebaseConfig.projectId}/public/data/recipes` },
            { name: 'posts', path: `artifacts/${firebaseConfig.projectId}/public/data/posts` },
            { name: 'lexicon', path: `artifacts/${firebaseConfig.projectId}/public/data/lexicon` },
            { name: 'books', path: `artifacts/${firebaseConfig.projectId}/public/data/books` }
        ];

        function showStatus(message, isError = false) {
            const statusDiv = document.getElementById('status');
            statusDiv.className = isError ? 'status error' : 'status';
            statusDiv.innerHTML = message;
        }

        function downloadJSON(data, filename) {
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function createDownloadLink(data, filename, collectionName) {
            const downloadsDiv = document.getElementById('downloads');
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);

            const linkDiv = document.createElement('div');
            linkDiv.style.marginTop = '10px';
            linkDiv.innerHTML = `
                <a href="${url}" download="${filename}" class="download-link">
                    📥 Download ${collectionName} (${data.length} items)
                </a>
            `;
            downloadsDiv.appendChild(linkDiv);
        }

        async function exportCollection(collectionInfo) {
            try {
                showStatus(`Fetching ${collectionInfo.name}...`);
                const collectionRef = collection(db, collectionInfo.path);
                const snapshot = await getDocs(collectionRef);

                const data = [];
                snapshot.forEach(doc => {
                    const docData = doc.data();
                    // Convert Firestore Timestamps to ISO strings
                    if (docData.created_at && docData.created_at.toDate) {
                        docData.created_at = docData.created_at.toDate().toISOString();
                    }
                    if (docData.updated_at && docData.updated_at.toDate) {
                        docData.updated_at = docData.updated_at.toDate().toISOString();
                    }
                    data.push({ id: doc.id, ...docData });
                });

                console.log(`${collectionInfo.name}:`, data);
                return data;
            } catch (error) {
                showStatus(`Error fetching ${collectionInfo.name}: ${error.message}`, true);
                console.error(error);
                return null;
            }
        }

        document.getElementById('exportBtn').addEventListener('click', async () => {
            const button = document.getElementById('exportBtn');
            button.disabled = true;
            document.getElementById('downloads').innerHTML = '';

            showStatus('Starting export...');

            const allData = {};

            for (const coll of collections) {
                const data = await exportCollection(coll);
                if (data) {
                    allData[coll.name] = data;
                    createDownloadLink(data, `${coll.name}.json`, coll.name);
                }
            }

            showStatus(`✅ Export complete! Downloaded ${Object.keys(allData).length} collections. Save these files to a /data folder in your project.`);
            button.disabled = false;
        });

        document.getElementById('exportIndividualBtn').addEventListener('click', async () => {
            const button = document.getElementById('exportIndividualBtn');
            button.disabled = true;
            document.getElementById('downloads').innerHTML = '';

            for (const coll of collections) {
                const data = await exportCollection(coll);
                if (data) {
                    createDownloadLink(data, `${coll.name}.json`, coll.name);
                }
            }

            showStatus('✅ All collections ready for download!');
            button.disabled = false;
        });
    </script>
</body>
</html>
