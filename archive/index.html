<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archive — Chomp Chomp</title>

  <link rel="icon" href="/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">

  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#ffffff">
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#1a1a1a">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">

  <style>
    .archive-header {
      max-width: 720px;
      margin: 40px auto 32px;
      padding: 0 20px;
    }

    .archive-header h1 {
      font-size: 1.6em;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
    }

    .archive-header p {
      color: var(--color-text-muted);
      font-size: 0.95em;
      line-height: 1.6;
    }

    .archive-controls {
      max-width: 720px;
      margin: 0 auto 24px;
      padding: 0 20px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
    }

    .archive-search {
      flex: 1;
      min-width: 180px;
      padding: 9px 14px;
      font-size: 14px;
      font-family: var(--font-primary);
      border: 1px solid var(--color-border);
      border-radius: 8px;
      background: var(--color-bg);
      color: var(--color-text);
    }

    .archive-search:focus {
      outline: none;
      border-color: var(--color-accent);
    }

    .type-filter {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .type-btn {
      padding: 5px 12px;
      font-size: 0.8em;
      font-family: var(--font-primary);
      border: 1px solid var(--color-border);
      border-radius: 20px;
      background: transparent;
      color: var(--color-text-muted);
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }

    .type-btn:hover,
    .type-btn.active {
      border-color: var(--color-accent);
      color: var(--color-accent);
      background: transparent;
    }

    .archive-list {
      max-width: 720px;
      margin: 0 auto 60px;
      padding: 0 20px;
    }

    .archive-entry {
      display: flex;
      gap: 16px;
      align-items: flex-start;
      padding: 18px 0;
      border-bottom: 1px solid var(--color-border);
    }

    .archive-entry:last-child {
      border-bottom: none;
    }

    .entry-type-badge {
      flex-shrink: 0;
      margin-top: 3px;
      padding: 3px 7px;
      font-size: 0.7em;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      border-radius: 4px;
      background: var(--color-border);
      color: var(--color-text-muted);
      min-width: 36px;
      text-align: center;
    }

    .entry-type-badge.pdf  { background: #fff0f0; color: #c0392b; }
    .entry-type-badge.html { background: #f0f4ff; color: #2c5fad; }
    .entry-type-badge.txt  { background: #f5f5f5; color: #555;    }

    @media (prefers-color-scheme: dark) {
      .entry-type-badge.pdf  { background: #3a1a1a; color: #ff8080; }
      .entry-type-badge.html { background: #1a2a40; color: #7aadff; }
      .entry-type-badge.txt  { background: #2a2a2a; color: #aaa;    }
    }

    .entry-body {
      flex: 1;
      min-width: 0;
    }

    .entry-title {
      font-size: 1em;
      font-weight: 500;
      margin-bottom: 4px;
    }

    .entry-title a {
      color: var(--color-text);
      text-decoration: none;
    }

    .entry-title a:hover {
      color: var(--color-accent);
    }

    .entry-meta {
      font-size: 0.8em;
      color: var(--color-text-muted);
      margin-bottom: 4px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .entry-desc {
      font-size: 0.88em;
      color: var(--color-text-muted);
      line-height: 1.5;
    }

    .entry-folder {
      font-size: 0.78em;
      color: var(--color-text-light);
      font-family: monospace;
    }

    .archive-breadcrumb {
      max-width: 720px;
      margin: 0 auto 8px;
      padding: 0 20px;
      font-size: 0.85em;
      color: var(--color-text-muted);
    }

    .archive-breadcrumb a {
      color: var(--color-text-muted);
    }

    .archive-breadcrumb a:hover {
      color: var(--color-accent);
    }

    .dir-entry {
      cursor: pointer;
    }

    .dir-entry .entry-title a {
      color: var(--color-accent);
    }

    .entry-size {
      font-size: 0.78em;
      color: var(--color-text-light);
    }

    .archive-empty {
      text-align: center;
      padding: 48px 20px;
      color: var(--color-text-muted);
      font-size: 0.95em;
    }

    .archive-count {
      font-size: 0.8em;
      color: var(--color-text-muted);
      max-width: 720px;
      margin: 0 auto 16px;
      padding: 0 20px;
    }
  </style>
</head>
<body>

  <header class="site-header">
    <nav class="site-nav">
      <div class="header-left">
        <a href="https://ps.chom.ps" title="Store" class="site-logo">
          <div class="site-logo-icon">
            <img src="https://ik.imagekit.io/chompchomp/logo-default_01ng4rCAq.png" alt="Chomp Chomp" class="logo-default">
            <img src="https://ik.imagekit.io/chompchomp/logo-hover_Xkgt_S3PG.jpg" alt="Chomp Chomp" class="logo-hover">
          </div>
        </a>
      </div>

      <div class="header-center">
        <a href="/recipes.html" title="Recipes">
          <img src="https://ik.imagekit.io/chompchomp/Chomp%20Chomp%20logo%20light" alt="Chomp Chomp" class="header-banner banner-light">
          <img src="https://ik.imagekit.io/chompchomp/Chomp%20Chomp%20logo%20dark"  alt="Chomp Chomp" class="header-banner banner-dark">
        </a>
      </div>

      <div class="header-right">
        <div class="nav-tools-dropdown">
          <button class="menu-toggle" onclick="toggleToolsDropdown()">☰</button>
          <button class="tools-dropdown-btn" onclick="toggleToolsDropdown()">Menu ▼</button>
          <ul class="tools-dropdown-menu" id="toolsDropdown">
            <!-- Loaded by navigation.js -->
          </ul>
        </div>
      </div>
    </nav>
  </header>

  <main class="page-container">

    <div class="archive-header">
      <h1>Archive</h1>
      <p>Documents, references, and collected files. Direct URLs also work — e.g. <code>/archive/filename.pdf</code> or <code>/archive/wiki/page.html</code>.</p>
    </div>

    <div class="archive-controls">
      <input type="search" class="archive-search" id="archiveSearch" placeholder="Search archive…" autocomplete="off">
      <div class="type-filter" id="typeFilter"></div>
    </div>

    <div class="archive-breadcrumb" id="breadcrumb"></div>
    <div class="archive-count" id="archiveCount"></div>

    <div class="archive-list" id="archiveList">
      <div class="archive-empty">Loading…</div>
    </div>

  </main>

  <script src="/navigation.js"></script>
  <script>
    const REPO = 'chomp-chomp-chomp/chomp';
    const BASE_DIR = 'archive';
    const IGNORE = new Set(['index.html', '.gitkeep', 'manifest.json']);
    const CACHE_TTL = 5 * 60 * 1000;

    let allEntries = [];
    let overrides = {};
    let activeType = null;
    let currentPath = '';

    function filenameToTitle(name) {
      const base = name.replace(/\.[^.]+$/, '');
      return base
        .replace(/[_-]+/g, ' ')
        .replace(/\b\w/g, c => c.toUpperCase());
    }

    function formatSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    function render(entries) {
      const list = document.getElementById('archiveList');
      const count = document.getElementById('archiveCount');

      if (!entries.length) {
        list.innerHTML = '<div class="archive-empty">No files found.</div>';
        count.textContent = '';
        return;
      }

      const dirs = entries.filter(e => e.type === 'dir');
      const files = entries.filter(e => e.type !== 'dir');
      const total = files.length + dirs.length;
      const parts = [];
      if (dirs.length) parts.push(dirs.length === 1 ? '1 folder' : `${dirs.length} folders`);
      if (files.length) parts.push(files.length === 1 ? '1 file' : `${files.length} files`);
      count.textContent = parts.join(', ');

      const dirHTML = dirs.map(e => `
        <div class="archive-entry dir-entry">
          <span class="entry-type-badge">dir</span>
          <div class="entry-body">
            <div class="entry-title"><a href="?path=${encodeURIComponent(e.path)}">${e.name}/</a></div>
          </div>
        </div>
      `).join('');

      const fileHTML = files.map(e => {
        const ext = (e.name.split('.').pop() || 'file').toLowerCase();
        const archivePath = e.path.replace(/^archive\//, '');
        const meta = overrides[archivePath] || overrides[e.name] || {};
        const title = meta.title || filenameToTitle(e.name);
        const desc = meta.description || '';
        const url = '/archive/' + archivePath;
        const size = e.size != null ? `<span class="entry-size">${formatSize(e.size)}</span>` : '';

        return `
          <div class="archive-entry">
            <span class="entry-type-badge ${ext}">${ext}</span>
            <div class="entry-body">
              <div class="entry-title"><a href="${url}" target="_blank" rel="noopener">${title}</a></div>
              <div class="entry-meta">
                <span class="entry-folder">${e.name}</span>
                ${size}
              </div>
              ${desc ? `<div class="entry-desc">${desc}</div>` : ''}
            </div>
          </div>
        `;
      }).join('');

      list.innerHTML = dirHTML + fileHTML;
    }

    function filter() {
      const q = document.getElementById('archiveSearch').value.toLowerCase().trim();
      let results = allEntries;

      if (activeType) {
        results = results.filter(e => {
          if (e.type === 'dir') return false;
          return (e.name.split('.').pop() || '').toLowerCase() === activeType;
        });
      }

      if (q) {
        results = results.filter(e => {
          const archivePath = e.path.replace(/^archive\//, '');
          const meta = overrides[archivePath] || overrides[e.name] || {};
          const title = meta.title || filenameToTitle(e.name);
          const desc = meta.description || '';
          return e.name.toLowerCase().includes(q) ||
            title.toLowerCase().includes(q) ||
            desc.toLowerCase().includes(q);
        });
      }

      render(results);
    }

    function buildTypeFilter(entries) {
      const extSet = new Set();
      entries.forEach(e => {
        if (e.type === 'dir') return;
        const ext = (e.name.split('.').pop() || '').toLowerCase();
        if (ext) extSet.add(ext);
      });
      const types = Array.from(extSet).sort();
      const container = document.getElementById('typeFilter');
      if (types.length < 2) return;

      container.innerHTML = ['all', ...types].map(t => `
        <button class="type-btn${t === 'all' ? ' active' : ''}" data-type="${t}">${t}</button>
      `).join('');

      container.querySelectorAll('.type-btn').forEach(btn => {
        btn.addEventListener('click', function() {
          container.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
          this.classList.add('active');
          activeType = this.dataset.type === 'all' ? null : this.dataset.type;
          filter();
        });
      });
    }

    function buildBreadcrumb(subPath) {
      const bc = document.getElementById('breadcrumb');
      if (!subPath) { bc.innerHTML = ''; return; }

      const parts = subPath.split('/');
      let html = '<a href="?">archive</a>';
      let accumulated = '';
      parts.forEach((part, i) => {
        accumulated += (accumulated ? '/' : '') + part;
        if (i < parts.length - 1) {
          html += ` / <a href="?path=archive/${encodeURIComponent(accumulated)}">${part}</a>`;
        } else {
          html += ` / ${part}`;
        }
      });
      bc.innerHTML = html;
    }

    function getCacheKey(dirPath) {
      return 'archive_cache_' + dirPath;
    }

    function getCache(dirPath) {
      try {
        const raw = sessionStorage.getItem(getCacheKey(dirPath));
        if (!raw) return null;
        const cached = JSON.parse(raw);
        if (Date.now() - cached.ts > CACHE_TTL) {
          sessionStorage.removeItem(getCacheKey(dirPath));
          return null;
        }
        return cached.data;
      } catch { return null; }
    }

    function setCache(dirPath, data) {
      try {
        sessionStorage.setItem(getCacheKey(dirPath), JSON.stringify({ ts: Date.now(), data }));
      } catch {}
    }

    async function fetchDir(dirPath) {
      const cached = getCache(dirPath);
      if (cached) return cached;

      const url = `https://api.github.com/repos/${REPO}/contents/${dirPath}?ref=main`;
      const res = await fetch(url);
      if (!res.ok) throw new Error(`GitHub API ${res.status}`);
      const data = await res.json();

      if (!Array.isArray(data)) throw new Error('Not a directory');

      const entries = data
        .filter(item => !IGNORE.has(item.name))
        .map(item => ({
          name: item.name,
          path: item.path,
          type: item.type === 'dir' ? 'dir' : 'file',
          size: item.size || 0
        }))
        .sort((a, b) => {
          if (a.type === 'dir' && b.type !== 'dir') return -1;
          if (a.type !== 'dir' && b.type === 'dir') return 1;
          return a.name.localeCompare(b.name);
        });

      setCache(dirPath, entries);
      return entries;
    }

    async function loadOverrides() {
      try {
        const res = await fetch('/archive/manifest.json');
        if (res.ok) {
          const data = await res.json();
          overrides = data.overrides || {};
        }
      } catch {}
    }

    async function init() {
      const params = new URLSearchParams(window.location.search);
      const pathParam = params.get('path') || BASE_DIR;
      currentPath = pathParam.startsWith(BASE_DIR) ? pathParam : BASE_DIR + '/' + pathParam;

      const subPath = currentPath.replace(/^archive\/?/, '');
      buildBreadcrumb(subPath);

      try {
        await loadOverrides();
        allEntries = await fetchDir(currentPath);
        buildTypeFilter(allEntries);
        render(allEntries);
      } catch (err) {
        document.getElementById('archiveList').innerHTML =
          '<div class="archive-empty">Could not load archive contents.</div>';
      }
    }

    document.getElementById('archiveSearch').addEventListener('input', filter);

    init();
  </script>
</body>
</html>
